<svg width="960" height="575" viewBox="0 0 960 575" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Schema: Semantisches Aufgabenformat, Renderer, optionaler Runtime Wrapper, seitliche KI-Skills und Analytics-Rückfluss">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#315CA8"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#D72638"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#52637A"/>
    </marker>
  </defs>

  <rect width="960" height="575" fill="#EEF3F8"/>

  <!-- ===================== Pipeline (links) ===================== -->

  <!-- 1 · Semantisches Aufgabenformat -->
  <g>
    <rect x="150" y="48" width="470" height="110" rx="14" fill="#EDF4FF" stroke="#315CA8" stroke-width="2.5"/>
    <text x="178" y="86" font-size="13" font-weight="700" fill="#315CA8" letter-spacing="0.5">1 · SEMANTISCHES AUFGABENFORMAT</text>
    <text x="178" y="113" font-size="17" font-weight="700" fill="#0B1F3A">Die Aufgabe als Daten — das Asset</text>
    <text x="178" y="137" font-size="13" fill="#315CA8">Lernziel · Antwortlogik · Feedback · Metadaten</text>
  </g>

  <!-- Pfeil 1 → 2 -->
  <line x1="385" y1="158" x2="385" y2="212" stroke="#315CA8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 2 · Renderer -->
  <g>
    <rect x="150" y="218" width="470" height="110" rx="14" fill="#F8FBFF" stroke="#5B82D6" stroke-width="2.5"/>
    <text x="178" y="256" font-size="13" font-weight="700" fill="#5B82D6" letter-spacing="0.5">2 · RENDERER &amp; KOMPONENTEN</text>
    <text x="178" y="283" font-size="17" font-weight="700" fill="#0B1F3A">Spielen die Aufgabe aus</text>
    <text x="178" y="307" font-size="13" fill="#315CA8">React · Web Components · LMS-Embed · App</text>
  </g>

  <!-- Pfeil 2 → 3 -->
  <line x1="385" y1="328" x2="385" y2="382" stroke="#315CA8" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- 3 · Runtime Wrapper (optional) -->
  <g>
    <rect x="150" y="388" width="470" height="110" rx="14" fill="#FFFFFF" stroke="#52637A" stroke-width="2.5" stroke-dasharray="8 6"/>
    <text x="178" y="426" font-size="13" font-weight="700" fill="#52637A" letter-spacing="0.5">3 · RUNTIME WRAPPER — OPTIONAL</text>
    <text x="178" y="453" font-size="17" font-weight="700" fill="#0B1F3A">Verbindet Aufgabe mit KI &amp; Tutor</text>
    <text x="178" y="477" font-size="13" fill="#315CA8">Tutor-State · Hinweise · Analytics-Events</text>
  </g>

  <!-- Fallback-Hinweis -->
  <text x="385" y="538" font-size="13" fill="#52637A" text-anchor="middle" font-style="italic">Ohne KI/Tutor läuft die Aufgabe trotzdem — z.&#8201;B. in Moodle.</text>

  <!-- ===================== KI-Skills (seitlich, rechts) ===================== -->

  <g>
    <rect x="700" y="118" width="220" height="290" rx="14" fill="#FFF0F2" stroke="#D72638" stroke-width="2.5"/>
    <text x="726" y="156" font-size="14" font-weight="700" fill="#D72638" letter-spacing="0.5">KI-SKILLS</text>
    <text x="726" y="180" font-size="13" fill="#8F1624" font-style="italic">seitliche Assistenz</text>

    <!-- Skill-Chips -->
    <g font-size="14" font-weight="600" fill="#8F1624">
      <rect x="726" y="200" width="168" height="38" rx="19" fill="#FFE4E8"/>
      <text x="810" y="225" text-anchor="middle">Authoring</text>
      <rect x="726" y="248" width="168" height="38" rx="19" fill="#FFE4E8"/>
      <text x="810" y="273" text-anchor="middle">Prüfung</text>
      <rect x="726" y="296" width="168" height="38" rx="19" fill="#FFE4E8"/>
      <text x="810" y="321" text-anchor="middle">Portierung</text>
      <rect x="726" y="344" width="168" height="38" rx="19" fill="#FFE4E8"/>
      <text x="810" y="369" text-anchor="middle">Erweiterung</text>
    </g>
  </g>

  <!-- Pfeile KI-Skills → Pipeline -->
  <line x1="700" y1="170" x2="628" y2="122" stroke="#D72638" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
  <line x1="700" y1="300" x2="628" y2="286" stroke="#D72638" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
  <text x="663" y="224" font-size="11" fill="#D72638" text-anchor="middle">helfen, statt</text>
  <text x="663" y="241" font-size="11" fill="#D72638" text-anchor="middle">auszuführen</text>

  <!-- ===================== Analytics-Rückfluss (links) ===================== -->

  <path d="M 150 443 C 62 443, 62 103, 142 103" fill="none" stroke="#52637A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowLoop)"/>
  <g transform="rotate(-90 76 273)">
    <text x="76" y="273" font-size="12.5" fill="#52637A" text-anchor="middle">Analytics &amp; Review fließen zurück</text>
  </g>
</svg>
