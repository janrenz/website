  <path class="arrow" d="M300 338 C334 338 350 310 385 302"/>
  <path class="arrow" d="M665 276 L755 276"/>
  <path class="arrow" d="M895 347 C895 420 770 432 700 474"/>
  <path class="arrow" d="M505 548 C430 610 300 650 205 742"/>
  <path class="arrow" d="M320 785 L505 790"/>
  <path class="arrow" d="M645 735 L645 616"/>
  <path class="arrow" d="M785 528 L890 528"/>
  <path class="loop" d="M890 555 C840 580 830 600 785 570"/>
  <path class="arrow" d="M785 590 C830 640 845 690 890 694"/>
  <path class="loop" d="M890 724 C835 735 825 640 785 585"/>
  <path class="arrow" d="M785 590 C850 750 835 825 890 826"/>

  <path class="assist" d="M370 525 C390 470 410 405 455 347"/>
  <path class="assist" d="M370 565 C520 540 650 410 755 335"/>
  <path class="assist" d="M370 610 C430 650 470 700 530 735"/>
  <text x="390" y="456" class="assistLabel">unterstützt Semantik</text>
  <text x="526" y="430" class="assistLabel">kennt Bibliotheken</text>
  <text x="370" y="690" class="assistLabel">bereitet Portierung/QA vor</text>

  <text x="670" y="260" class="label">ausspielen</text>
  <text x="790" y="410" class="label">optional verbinden</text>
  <text x="340" y="770" class="label">State exponieren</text>
</svg>