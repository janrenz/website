<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Schema: Semantisches Aufgabenformat, KI-Skills als Begleitschicht, Renderer und Runtime Wrapper</title>
  <desc id="desc">Architekturdiagramm: Aus Quellen und Redaktion entsteht ein semantisches Aufgabenformat. Renderer-Bibliotheken spielen es aus. Ein optionaler Runtime Wrapper verbindet State, Tutor, KI und Analytics. KI-Skills stehen seitlich als Authoring-, Prüf-, Portierungs- und Erweiterungshilfe, nicht als eigene Ausführungsebene.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#315ca8"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f3558" flood-opacity="0.16"/></filter>
    <style>
      .bg{fill:#eef3f8}.box{fill:#fff;stroke:#c9d6e6;stroke-width:2;filter:url(#shadow)}.primary{fill:#edf4ff;stroke:#5b82d6}.runtime{fill:#fff3df;stroke:#d7922c}.skills{fill:#fff0f2;stroke:#d72638}.external{fill:#f1fbf3;stroke:#5ba86c}.title{font:700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#16233a}.text{font:700 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#263850}.small{font:500 13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#52637a}.arrow{stroke:#315ca8;stroke-width:2.6;fill:none;marker-end:url(#arrow)}.assist{stroke:#d72638;stroke-width:2.4;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}.loop{stroke:#7390be;stroke-width:2.2;fill:none;stroke-dasharray:8 7;marker-end:url(#arrow)}.label{font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#315ca8}.assistLabel{font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#b71e2d}
    </style>
  </defs>
  <rect class="bg" width="1280" height="900"/>
  <text x="60" y="58" class="title">H5P entkoppeln: Semantik → Renderer → optionale Runtime</text>
  <text x="60" y="86" class="small">KI-Skills stehen daneben: Sie helfen beim Authoring, Prüfen, Portieren und Erweitern — sie sind keine eigene Ausführungsebene.</text>

  <rect class="box" x="70" y="145" width="230" height="92" rx="20"/><text x="94" y="181" class="text">Quellen &amp; Medien</text><text x="94" y="209" class="small">Lehrplan, Fachtexte, Video</text>
  <rect class="box" x="70" y="292" width="230" height="92" rx="20"/><text x="94" y="328" class="text">Redaktion / H5P-Editor</text><text x="94" y="356" class="small">Authoring, Review, Freigabe</text>

  <rect class="box primary" x="385" y="205" width="280" height="142" rx="22"/><text x="410" y="244" class="text">Semantisches Format</text><text x="410" y="274" class="small">QX / QTI-Profil / JSON-LD</text><text x="410" y="298" class="small">Aufgabe, Lernziel, Feedback</text><text x="410" y="322" class="small">Lizenz, A11y, Metadaten</text>

  <rect class="box" x="755" y="205" width="280" height="142" rx="22"/><text x="780" y="244" class="text">Renderer-Bibliotheken</text><text x="780" y="274" class="small">React, Web Components</text><text x="780" y="298" class="small">Video-Interaktionen, LMS/App</text><text x="780" y="322" class="small">standardisierte UI-Komponenten</text>

  <rect class="box runtime" x="505" y="474" width="280" height="142" rx="22"/><text x="530" y="512" class="text">Optionaler Runtime Wrapper</text><text x="530" y="542" class="small">State, Events, Policy</text><text x="530" y="566" class="small">KI-Gateway, Tutor API</text><text x="530" y="590" class="small">Graceful Degradation</text>

  <rect class="box skills" x="70" y="472" width="300" height="178" rx="22"/><text x="94" y="512" class="text">KI-Skills als Begleitschicht</text><text x="94" y="542" class="small">Authoring: passende Semantik</text><text x="94" y="566" class="small">QA: Didaktik, A11y, Lizenz</text><text x="94" y="590" class="small">Portierung: QTI/LMS/xAPI</text><text x="94" y="614" class="small">Erweiterung: fehlende Komponenten</text>

  <rect class="box" x="70" y="742" width="250" height="86" rx="20"/><text x="94" y="777" class="text">Lernende:r</text><text x="94" y="804" class="small">Web, Moodle, App, Embed</text>
  <rect class="box primary" x="505" y="735" width="280" height="108" rx="20"/><text x="530" y="774" class="text">Task State</text><text x="530" y="802" class="small">Auswahl, Versuche, Hilfen</text><text x="530" y="826" class="small">Fehler, Fortschritt, Events</text>
  <rect class="box external" x="890" y="470" width="280" height="112" rx="20"/><text x="914" y="508" class="text">Tutor / Lernbegleitung</text><text x="914" y="536" class="small">Kontext, Diagnose</text><text x="914" y="560" class="small">nächste sinnvolle Hilfe</text>
  <rect class="box external" x="890" y="638" width="280" height="112" rx="20"/><text x="914" y="676" class="text">KI zur Laufzeit</text><text x="914" y="704" class="small">Hints, Erklärungen</text><text x="914" y="728" class="small">optional, policy-gesteuert</text>
  <rect class="box" x="890" y="788" width="280" height="78" rx="20"/><text x="914" y="821" class="text">Analytics / Review</text><text x="914" y="848" class="small">xAPI, Caliper, Qualität</text>

