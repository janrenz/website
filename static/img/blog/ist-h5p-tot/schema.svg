<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Schema: Semantisches Aufgabenformat, Skills, Runtime Wrapper und Renderer</title>
  <desc id="desc">Architekturdiagramm: Quellen und Redaktion erzeugen mit KI ein semantisches Aufgabenformat. Skills validieren und bewerten. Ein Runtime Wrapper verbindet Renderer, Task State, Tutor, KI und Analytics.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#315ca8"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f3558" flood-opacity="0.16"/></filter>
    <style>
      .bg{fill:#eef3f8}.box{fill:#fff;stroke:#c9d6e6;stroke-width:2;filter:url(#shadow)}.primary{fill:#edf4ff;stroke:#5b82d6}.runtime{fill:#fff3df;stroke:#d7922c}.external{fill:#f1fbf3;stroke:#5ba86c}.danger{fill:#fff0f2;stroke:#c96b7a}.title{font:700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#16233a}.text{font:700 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#263850}.small{font:500 13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#52637a}.arrow{stroke:#315ca8;stroke-width:2.6;fill:none;marker-end:url(#arrow)}.loop{stroke:#7390be;stroke-width:2.2;fill:none;stroke-dasharray:8 7;marker-end:url(#arrow)}.label{font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#315ca8}
    </style>
  </defs>
  <rect class="bg" width="1280" height="900"/>
  <text x="60" y="58" class="title">H5P entkoppeln: Semantik → Skill → Runtime → Renderer</text>
  <text x="60" y="86" class="small">Portable Semantik, qualitätsgesicherte Skills, wiederverwendbare Aufgabenbibliotheken und kontrollierte KI-/Tutor-Anbindung.</text>

  <rect class="box" x="60" y="150" width="220" height="96" rx="20"/><text x="84" y="186" class="text">Quellen &amp; Medien</text><text x="84" y="214" class="small">Lehrplan, Fachtexte, Video</text>
  <rect class="box" x="60" y="310" width="220" height="96" rx="20"/><text x="84" y="346" class="text">Redaktion</text><text x="84" y="374" class="small">Briefing, Review, Freigabe</text>
  <rect class="box danger" x="340" y="220" width="230" height="116" rx="20"/><text x="364" y="258" class="text">KI-Generierung</text><text x="364" y="286" class="small">Entwürfe, Varianten, Feedback</text><text x="364" y="310" class="small">vor Veröffentlichung</text>
  <rect class="box primary" x="630" y="208" width="270" height="140" rx="20"/><text x="654" y="246" class="text">Semantisches Format</text><text x="654" y="276" class="small">QX / QTI-Profil / JSON-LD</text><text x="654" y="300" class="small">Aufgabe, Lernziel, Feedback</text><text x="654" y="324" class="small">Lizenz, A11y, Metadaten</text>
  <rect class="box primary" x="970" y="208" width="240" height="140" rx="20"/><text x="994" y="246" class="text">Skill-Schicht</text><text x="994" y="276" class="small">Validierung &amp; QA</text><text x="994" y="300" class="small">Bewertung &amp; Feedback</text><text x="994" y="324" class="small">Varianten &amp; Normalisierung</text>
  <rect class="box runtime" x="500" y="462" width="280" height="150" rx="22"/><text x="524" y="502" class="text">Runtime Wrapper</text><text x="524" y="532" class="small">State, Events, Policy</text><text x="524" y="556" class="small">KI-Gateway, Tutor API</text><text x="524" y="580" class="small">Datenschutz &amp; Logging</text>
  <rect class="box" x="60" y="490" width="300" height="116" rx="20"/><text x="84" y="528" class="text">Renderer-Bibliotheken</text><text x="84" y="556" class="small">React, Web Components</text><text x="84" y="580" class="small">Video-Interaktionen, LMS/App</text>
  <rect class="box" x="60" y="710" width="260" height="96" rx="20"/><text x="84" y="746" class="text">Lernende:r</text><text x="84" y="774" class="small">Web, LMS, App, Embed</text>
  <rect class="box primary" x="500" y="710" width="280" height="112" rx="20"/><text x="524" y="748" class="text">Task State</text><text x="524" y="776" class="small">Auswahl, Versuche, Hilfen</text><text x="524" y="800" class="small">Fehler, Fortschritt, Events</text>
  <rect class="box external" x="880" y="462" width="280" height="116" rx="20"/><text x="904" y="500" class="text">Tutor / Lernbegleitung</text><text x="904" y="528" class="small">Kontext, Diagnose</text><text x="904" y="552" class="small">nächste sinnvolle Hilfe</text>
  <rect class="box external" x="880" y="632" width="280" height="116" rx="20"/><text x="904" y="670" class="text">KI zur Laufzeit</text><text x="904" y="698" class="small">Hints, Erklärungen</text><text x="904" y="722" class="small">Varianten, Reflexion</text>
  <rect class="box" x="880" y="780" width="280" height="82" rx="20"/><text x="904" y="815" class="text">Analytics / Review</text><text x="904" y="842" class="small">xAPI, Caliper, Qualität</text>

  <path class="arrow" d="M280 198 C310 198 310 255 340 255"/><path class="arrow" d="M280 358 C310 358 310 300 340 300"/><path class="arrow" d="M570 278 L630 278"/><path class="arrow" d="M280 358 C450 400 510 340 630 316"/><path class="arrow" d="M900 278 L970 278"/><path class="arrow" d="M1090 348 C1090 420 800 390 710 462"/><path class="arrow" d="M500 535 L360 548"/><path class="arrow" d="M210 606 L210 710"/><path class="arrow" d="M320 758 L500 766"/><path class="arrow" d="M640 710 L640 612"/><path class="arrow" d="M780 520 L880 520"/><path class="loop" d="M880 548 C825 570 825 612 780 570"/><path class="arrow" d="M780 585 C830 625 835 690 880 690"/><path class="loop" d="M880 720 C830 735 820 635 780 590"/><path class="arrow" d="M780 585 C850 760 830 820 880 820"/><path class="loop" d="M880 842 C690 880 250 870 170 406"/>
  <text x="390" y="202" class="label">Entwurf</text><text x="908" y="260" class="label">prüfen &amp; ausführen</text><text x="385" y="530" class="label">rendern</text><text x="356" y="742" class="label">State exponieren</text><text x="792" y="504" class="label">Tutor API</text><text x="802" y="675" class="label">KI-Gateway</text>
</svg>
